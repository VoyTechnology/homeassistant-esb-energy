name: Tag on manifest version change

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('custom_components/esb_energy/manifest.json', 'utf8'));
            const version = (manifest.version || '').trim();
            if (!version) {
              core.setFailed('No version found in manifest.json');
              return;
            }
            core.setOutput('version', version);

      - name: Check for existing tag
        id: tagcheck
        run: |
          if git rev-parse "refs/tags/${{ steps.manifest.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          git tag "${{ steps.manifest.outputs.version }}"
          git push origin "${{ steps.manifest.outputs.version }}"

      - name: Create GitHub release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.version }}
          generate_release_notes: true
